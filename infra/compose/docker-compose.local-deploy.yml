# Local-deploy compose override
# Replaces build: directives with pre-built GHCR images so the full stack can
# be brought up on any Docker host without rebuilding from source.
#
# Required env vars (set in the calling shell or CI job):
#   REGISTRY      — container registry host, e.g. ghcr.io
#   IMAGE_PREFIX  — lowercase org/repo, e.g. myorg/gstack-mes
#   IMAGE_TAG     — short SHA or semantic tag produced by the build-and-push job
#
# Usage (CI):
#   docker compose \
#     -f infra/compose/docker-compose.yml \
#     -f infra/compose/docker-compose.local-deploy.yml \
#     up -d --pull=always
#
# Usage (local, after exporting the three vars):
#   export REGISTRY=ghcr.io IMAGE_PREFIX=myorg/gstack-mes IMAGE_TAG=latest
#   docker compose \
#     -f infra/compose/docker-compose.yml \
#     -f infra/compose/docker-compose.local-deploy.yml \
#     up -d

services:
  api:
    image: ${REGISTRY}/${IMAGE_PREFIX}/api:${IMAGE_TAG}

  web:
    image: ${REGISTRY}/${IMAGE_PREFIX}/web:${IMAGE_TAG}

  opcua-collector:
    image: ${REGISTRY}/${IMAGE_PREFIX}/opcua-collector:${IMAGE_TAG}

  scadalts-collector:
    image: ${REGISTRY}/${IMAGE_PREFIX}/scadalts-collector:${IMAGE_TAG}
