version: "3.9"

# MES Local Development Stack
# ADR-001 Decision 8: Docker Compose for local dev — identical container images
# used for both cloud (ECS Fargate) and on-prem (k3s) paths.
#
# Usage:
#   Core stack (CI + fast local dev):
#     docker compose -f infra/compose/docker-compose.yml up -d
#
#   Full stack including Scada-LTS (local dev only):
#     docker compose -f infra/compose/docker-compose.yml --profile scadalts up -d
#
# Services (core — always started):
#   postgres            — PostgreSQL 16 + TimescaleDB extension (port 5432)
#   emqx                — EMQX 5 MQTT broker (MQTT: 1883, Dashboard: 18083, WebSocket: 8083)
#   api                 — MES API (Fastify v5, port 3000)
#   web                 — React 19 frontend via nginx (port 8080)
#   opcua-collector     — OPC-UA → MQTT bridge (dev: synthetic telemetry mode)
#
# Services (profile: scadalts — opt-in, excluded from CI):
#   scadalts-db         — MySQL 5.7 backing store for Scada-LTS (internal only)
#   scadalts            — Scada-LTS SCADA server (port 8888 → Tomcat 8080)
#   scadalts-collector  — Polls Scada-LTS REST API and publishes telemetry to EMQX (ADR-001 Decision 7)
#
# Why the scadalts profile? Scada-LTS has a 3-minute Tomcat start_period (180 s) which
# pushes "docker compose up -d" past the 5-minute CI timeout on cold GitHub Actions runners.

services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: mes-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: mes_dev
      POSTGRES_USER: mes
      POSTGRES_PASSWORD: mes
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mes -d mes_dev"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  emqx:
    image: emqx/emqx:5.8.4
    container_name: mes-emqx
    restart: unless-stopped
    environment:
      EMQX_NODE__NAME: emqx@localhost
      EMQX_LOG__CONSOLE__LEVEL: warning
      # Allow anonymous connections in dev (gate with auth in production)
      EMQX_AUTHENTICATION__1__MECHANISM: password_based
      EMQX_AUTHENTICATION__1__BACKEND: built_in_database
      EMQX_AUTHENTICATION__1__ENABLE: "false"
    ports:
      - "1883:1883"    # MQTT
      - "8083:8083"    # MQTT over WebSocket
      - "18083:18083"  # EMQX Dashboard (admin / public)
    volumes:
      - emqx_data:/opt/emqx/data
      - emqx_log:/opt/emqx/log
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/18083' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  api:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.api
    container_name: mes-api
    restart: unless-stopped
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://mes:mes@postgres:5432/mes_dev}
      - MQTT_URL=${MQTT_URL:-mqtt://emqx:1883}
      - JWT_SECRET=${JWT_SECRET:-dev-only-secret-change-me-in-production}
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:8080}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - API_PORT=3000
      - API_HOST=0.0.0.0
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      emqx:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3000/health').then(r=>process.exit(r.ok?0:1))\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  web:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.web
    container_name: mes-web
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      api:
        condition: service_healthy

  opcua-collector:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.opcua-collector
    container_name: mes-opcua-collector
    restart: unless-stopped
    environment:
      - MQTT_URL=${MQTT_URL:-mqtt://emqx:1883}
      - OPCUA_ENDPOINTS=${OPCUA_ENDPOINTS:-[]}
      - OPCUA_SECURITY_POLICY=${OPCUA_SECURITY_POLICY:-None}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    depends_on:
      emqx:
        condition: service_healthy

  # ── Scada-LTS stack ──────────────────────────────────────────────────────────
  # These three services are optional for local dev and excluded from CI by default.
  # Scada-LTS has a 3-minute Tomcat startup (start_period: 180s) that would push
  # "docker compose up -d" past the CI 5-minute timeout on cold runners.
  #
  # Start the full stack locally:
  #   docker compose --profile scadalts up -d
  # Start just the core MES stack (API, web, DB, MQTT):
  #   docker compose up -d   (no --profile flag)

  scadalts-db:
    profiles: [scadalts]
    image: mysql:8.4
    container_name: mes-scadalts-db
    restart: unless-stopped
    # MySQL 8.4 enables binary logging by default. Scada-LTS V1.1 migration creates
    # NOT DETERMINISTIC stored functions which MySQL 8.4 rejects when log_bin is ON
    # and log_bin_trust_function_creators is OFF. This flag allows function creation.
    command: --log-bin-trust-function-creators=1
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: scadalts
    volumes:
      - scadalts_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  scadalts:
    profiles: [scadalts]
    image: scadalts/scadalts:release-2.8.1
    container_name: mes-scadalts
    restart: unless-stopped
    depends_on:
      scadalts-db:
        condition: service_healthy
    ports:
      - "8888:8080"    # Scada-LTS UI — default login: admin / admin
    volumes:
      - ./scadalts-context.xml:/usr/local/tomcat/webapps/Scada-LTS/META-INF/context.xml:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -sf -X POST 'http://localhost:8080/Scada-LTS/api/auth/admin/admin' -o /dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 180s

  scadalts-collector:
    profiles: [scadalts]
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.scadalts-collector
    container_name: mes-scadalts-collector
    restart: unless-stopped
    ports:
      - "9090:9090"    # Health check (liveness probe)
    volumes:
      - ./config/datapoints.yml:/app/config/datapoints.yml:ro
    environment:
      - SCADALTS_BASE_URL=${SCADALTS_BASE_URL:-http://scadalts:8080/Scada-LTS}
      - SCADALTS_PASSWORD=${SCADALTS_PASSWORD:-admin}
      - MQTT_URL=${MQTT_URL:-mqtt://emqx:1883}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    depends_on:
      emqx:
        condition: service_healthy
      scadalts:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  postgres_data:
  emqx_data:
  emqx_log:
  scadalts_db_data:
