name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"

jobs:
  # ─── Unit Tests (every PR) ───────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace packages
        run: pnpm turbo build --filter="./packages/*"

      - name: Run unit tests (all packages and apps)
        run: pnpm turbo test:unit
        env:
          CI: true

  # ─── Integration Tests (every PR, matrix per app) ────────────────────────────
  integration-tests:
    name: Integration Tests (${{ matrix.app }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: unit-tests

    strategy:
      fail-fast: false
      matrix:
        # Only apps that have a test:integration script.
        # scadalts-collector integration tests are a Phase 2 deliverable.
        app: [api]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace packages
        run: pnpm turbo build --filter="./packages/*"

      - name: Pre-pull testcontainers images
        # Pull the TimescaleDB image before the test suite starts so the cold-pull
        # time does not count against the 120 s beforeAll timeout in Jest.
        run: docker pull timescale/timescaledb:latest-pg16
        timeout-minutes: 10

      - name: Run integration tests — ${{ matrix.app }}
        run: pnpm --filter "@mes/${{ matrix.app }}" test:integration
        env:
          CI: true
          # Testcontainers will pull images; no external credentials needed for Docker Hub
          TESTCONTAINERS_RYUK_DISABLED: "false"

  # ─── E2E Tests (PRs touching apps/ or e2e/) ──────────────────────────────────
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: unit-tests
    if: |
      github.event_name == 'push' ||
      contains(github.event.pull_request.changed_files, 'apps/') ||
      contains(github.event.pull_request.changed_files, 'e2e/')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace packages
        # E2E specs import @mes/test-fixtures directly (not via Docker), so the
        # TypeScript packages must be compiled to dist/ before Playwright runs.
        run: pnpm turbo build --filter="./packages/*"

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Build Docker images
        run: docker compose -f infra/compose/docker-compose.yml build
        timeout-minutes: 15

      - name: Start Docker Compose stack
        run: docker compose -f infra/compose/docker-compose.yml up -d
        timeout-minutes: 5

      - name: Wait for stack to be healthy
        run: |
          echo "Waiting for API to be ready..."
          timeout 120 bash -c 'until curl -sf http://localhost:3000/health; do sleep 2; done'
          echo "Waiting for Web UI to be ready..."
          timeout 60 bash -c 'until curl -sf http://localhost:8080; do sleep 2; done'

      - name: Run E2E tests
        run: pnpm test:e2e
        env:
          CI: true
          BASE_URL: http://localhost:8080
          API_BASE_URL: http://localhost:3000

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7

      - name: Stop Docker Compose stack
        if: always()
        run: docker compose -f infra/compose/docker-compose.yml down

  # ─── Contract Validation (every PR) ─────────────────────────────────────────
  contract-validation:
    name: Contract Validation
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: unit-tests

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate EMQX config — no DB-write rules (AC-ERP-06)
        run: |
          # Check only EMQX .conf files (not docker-compose env vars) for rule chain DB writes.
          # The built_in_database env var in docker-compose is the auth backend type — not a violation.
          if find infra/ -name "*.conf" | \
             xargs grep -l "postgresql.*action\|bridge.*postgresql\|resource_type.*pgsql" 2>/dev/null | grep -q .; then
            echo "ERROR: EMQX config contains DB-write rule chain (AC-ERP-06 violation)"
            exit 1
          fi
          echo "EMQX config check passed"

  # ─── Lint / Typecheck / Build (every PR) ────────────────────────────────────
  lint-typecheck-build:
    name: Lint / Typecheck / Build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm turbo lint

      - name: Typecheck
        run: pnpm turbo typecheck

      - name: Build
        run: pnpm turbo build
